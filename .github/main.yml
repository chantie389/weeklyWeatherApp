name: Android CI (Kotlin)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Kotlin projects NEED Java 17 or higher — this is the standard now
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Correct SDK setup for modern Kotlin/Compose projects
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      # ✅ Fix permissions (critical on Ubuntu)
      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # ✅ Build — this works perfectly for Kotlin & Compose
      - name: Build App
        run: ./gradlew assembleDebug --stacktrace

      # Optional: Run tests too
      - name: Run Tests
        run: ./gradlew testDebugUnitTest